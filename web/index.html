<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="捷奏——台北捷運即時模擬地圖：依當日時刻表推演全網列車，官方到站看板即時校正。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:title" content="捷奏 — 北捷即時地圖" />
    <meta property="og:description" content="打開網頁，就看見整個台北捷運正在呼吸——時刻表推演＋官方看板即時校正。" />
    <meta property="og:url" content="https://mrtrhythm.scottchen0622.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <title>捷奏 — 北捷即時地圖</title>
  </head>
  <body>
    <div id="map"></div>

    <header class="topbar">
      <span class="logo">捷奏</span>
      <span id="dayBadge" class="badge day">—</span>
      <span id="trainCount" class="badge">載入中…</span>
      <span id="liveBadge" class="badge live" title="即時⚡＝官方到站看板校正中；表定＝純時刻表模擬">表定</span>
      <button id="themeBtn" class="iconbtn" title="外觀">◐</button>
      <button id="aboutBtn" class="iconbtn" title="關於捷奏">ℹ</button>
    </header>

    <div class="search">
      <input id="searchInput" type="search" placeholder="🔍 搜尋車站（北車、Tamsui…）" autocomplete="off" />
      <div id="searchResults" class="results hidden"></div>
    </div>

    <div id="alertBanner" class="alertbanner hidden"></div>
    <div id="aboutPanel" class="about hidden">
      <div class="about-card">
        <h3>捷奏 <small id="aboutBuild"></small></h3>
        <p>依 TDX 當日時刻表推演台北捷運全網列車，營運時段以官方到站看板即時校正（左上「即時⚡」）。列車位置為推演結果，僅供參考，請以現場資訊為準。</p>
        <p>資料來源：交通部 TDX 運輸資料流通服務平臺、臺北大眾捷運股份有限公司（政府資料開放授權條款）｜底圖 © OpenStreetMap © CARTO</p>
        <p><a href="https://github.com/sc126-cornell/mrtrhythm" target="_blank" rel="noopener">GitHub 開源（MIT）</a>・回報問題也請走 GitHub Issues</p>
        <button id="aboutClose">關閉</button>
      </div>
    </div>
    <div id="stationboard" class="stationboard hidden"></div>
    <div id="fpsMeter" class="fps hidden"></div>
    <div id="traininfo" class="traininfo hidden"></div>
    <button id="backBtn" class="backbtn hidden">🎥 回到列車</button>

    <footer class="timebar">
      <button id="btnPause" title="暫停（空白鍵）">⏸</button>
      <div class="speeds">
        <button data-speed="1" class="on">1×</button>
        <button data-speed="10">10×</button>
        <button data-speed="30">30×</button>
        <button data-speed="60">60×</button>
      </div>
      <span id="clockDisplay" class="clock">--:--:--</span>
      <input id="timeSlider" type="range" min="18000" max="97200" step="60" value="43200" aria-label="時間軸" />
      <button id="btnNow" title="跳回現在時刻">現在</button>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
