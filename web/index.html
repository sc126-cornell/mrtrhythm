<!doctype html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="捷奏——台北捷運即時模擬地圖：依當日時刻表推演全網列車，官方到站看板即時校正。" />
    <title>捷奏 — 北捷即時地圖</title>
  </head>
  <body>
    <div id="map"></div>

    <header class="topbar">
      <span class="logo">捷奏</span>
      <span id="dayBadge" class="badge day">—</span>
      <span id="trainCount" class="badge">載入中…</span>
    </header>

    <div id="fpsMeter" class="fps hidden"></div>
    <div id="traininfo" class="traininfo hidden"></div>

    <footer class="timebar">
      <button id="btnPause" title="暫停（空白鍵）">⏸</button>
      <div class="speeds">
        <button data-speed="1" class="on">1×</button>
        <button data-speed="10">10×</button>
        <button data-speed="30">30×</button>
        <button data-speed="60">60×</button>
      </div>
      <span id="clockDisplay" class="clock">--:--:--</span>
      <input id="timeSlider" type="range" min="18000" max="97200" step="60" value="43200" aria-label="時間軸" />
      <button id="btnNow" title="跳回現在時刻">現在</button>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
